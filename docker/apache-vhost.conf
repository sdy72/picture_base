ServerName picture-browser

<VirtualHost *:80>
    ServerName picture-browser
    DocumentRoot /var/www/html
    DirectoryIndex disabled
    ProxyRequests Off

    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex disabled

        RewriteEngine On
        RewriteRule ^hed/?$ /hed/index.php [END]
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [END]
        RewriteRule ^hed/ /hed/index.php [END]
    </Directory>

    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://picture-browser-php:9000"
    </FilesMatch>

    <DirectoryMatch "^/var/www/html/hed/(src|vendor|pictures)(/|$)">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "^\.|^composer\.(json|lock)$|^bootstrap\.php$">
        Require all denied
    </FilesMatch>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
